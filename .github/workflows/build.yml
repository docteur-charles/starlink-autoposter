name: Build Starlink AutoPoster

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build .exe avec PyInstaller
        run: pyinstaller packaging/starlink-autoposter.spec --distpath build/dist --workpath build/work --clean -y

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: starlink-autoposter-windows
          path: build/dist/starlink-autoposter.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dependances systeme
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Installer les dependances Python
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binaire avec PyInstaller
        run: pyinstaller packaging/starlink-autoposter.spec --distpath build/dist --workpath build/work --clean -y

      - name: Build .deb
        run: bash packaging/build_deb.sh

      - name: Upload binaire Linux
        uses: actions/upload-artifact@v4
        with:
          name: starlink-autoposter-linux
          path: build/dist/starlink-autoposter

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: starlink-autoposter-deb
          path: build/deb/*.deb
